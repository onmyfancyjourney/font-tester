<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Font Tester</title>

<style>
  @font-face {
    font-family: "CustomFont";
    src: url("./fonts/font.woff2") format("woff2");
    font-display: swap;
    /* Variable font range */
    font-weight: 100 900;
  }

  :root {
    --font-size: 96px;
    --line-height: 1.1;
    --letter-spacing: 0px;
    --font-weight: 400;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    color: #000000;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* Controls Panel */
  .controls {
    border-right: 1px solid #000;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    background: #fff;
  }

  h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .control {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .value {
    font-family: monospace;
  }

  input[type="range"] {
    width: 100%;
    appearance: none;
    height: 1px;
    background: #000;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    background: #000;
    border-radius: 50%;
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #000;
    border: none;
    border-radius: 50%;
  }

  button {
    padding: 10px 14px;
    border: 1px solid #000;
    background: #fff;
    color: #000;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  button:hover {
    background: #000;
    color: #fff;
  }

  /* Preview Area */
  .preview-wrapper {
    padding: 48px;
    overflow: auto;
  }

  .preview {
    font-family: "CustomFont", sans-serif;
    font-size: var(--font-size);
    line-height: var(--line-height);
    letter-spacing: var(--letter-spacing);
    font-weight: var(--font-weight);
    outline: none;
    min-height: calc(100vh - 96px);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .preview:focus {
    outline: none;
  }

  /* Mobile Layout */
  @media (max-width: 768px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }

    .controls {
      position: relative;
      height: auto;
      border-right: none;
      border-bottom: 1px solid #000;
    }

    .preview-wrapper {
      padding: 24px;
    }

    .preview {
      min-height: 50vh;
    }
  }
</style>
</head>

  <aside class="controls">

        <span>Letter Spacing</span>

<script>
  const root = document.documentElement;

  const controls = {
    fontSize: document.getElementById("fontSize"),
    lineHeight: document.getElementById("lineHeight"),
    letterSpacing: document.getElementById("letterSpacing"),
    fontWeight: document.getElementById("fontWeight")
  };

  const values = {
    fontSize: document.getElementById("fontSizeValue"),
    lineHeight: document.getElementById("lineHeightValue"),
    letterSpacing: document.getElementById("letterSpacingValue"),
    fontWeight: document.getElementById("fontWeightValue")
  };

  function updateStyles() {
    const fontSize = controls.fontSize.value;
    const lineHeight = controls.lineHeight.value;
    const letterSpacing = controls.letterSpacing.value;
    const fontWeight = controls.fontWeight.value;

    root.style.setProperty("--font-size", fontSize + "px");
    root.style.setProperty("--line-height", lineHeight);
    root.style.setProperty("--letter-spacing", letterSpacing + "px");
    root.style.setProperty("--font-weight", fontWeight);

    values.fontSize.textContent = fontSize + "px";
    values.lineHeight.textContent = lineHeight;
    values.letterSpacing.textContent = letterSpacing + "px";
    values.fontWeight.textContent = fontWeight;
  }

  Object.values(controls).forEach(control => {
    control.addEventListener("input", updateStyles);
  });

  document.getElementById("resetButton").addEventListener("click", () => {
    controls.fontSize.value = 96;
    controls.lineHeight.value = 1.1;
    controls.letterSpacing.value = 0;
    controls.fontWeight.value = 400;
    updateStyles();
  });
